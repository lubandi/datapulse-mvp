version: "3.8"

services:
  # --- PostgreSQL Database ---
  db:
    image: postgres:15-alpine
    container_name: datapulse-db
    environment:
      POSTGRES_USER: datapulse
      POSTGRES_PASSWORD: datapulse
      POSTGRES_DB: datapulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U datapulse" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis (Celery broker + result backend) ---
  redis:
    image: redis:7-alpine
    container_name: datapulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Django Backend API ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-backend
    environment:
      DJANGO_SETTINGS_MODULE: "datapulse.settings.prod"
      DATABASE_URL: postgresql://datapulse:datapulse@db:5432/datapulse
      SECRET_KEY: change-me-in-production
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Celery Worker (processes async tasks) ---
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-celery-worker
    command: celery -A datapulse worker --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: "datapulse.settings.prod"
      DATABASE_URL: postgresql://datapulse:datapulse@db:5432/datapulse
      SECRET_KEY: change-me-in-production
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Celery Beat (scheduled task scheduler) ---
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datapulse-celery-beat
    command: celery -A datapulse beat --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: "datapulse.settings.prod"
      DATABASE_URL: postgresql://datapulse:datapulse@db:5432/datapulse
      SECRET_KEY: change-me-in-production
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  upload_data:
