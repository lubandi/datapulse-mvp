[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    migrations,
    .venv,
    venv,
    backendv1

ignore =
    E203,
    W503,
    E501

per-file-ignores =
    tests/*:E402,F401
    */tests/*:E402,F401
    *settings/base.py:E402
    *settings/dev.py:F403,F405,E402
    *settings/prod.py:F403,F405,E402


[isort]
profile = black
multi_line_output = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
line_length = 120
skip = migrations, venv, .venv, backendv1

[tool:pytest]
DJANGO_SETTINGS_MODULE = datapulse.settings.dev
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
